name: Build and Push

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

env:
  IMAGE_NAME: menci/archlinuxarm

jobs:
  build:
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - tag: base
            package-group: base
          - tag: base-devel
            package-group: base base-devel
    name: ${{ matrix.target.tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Tag List
        run: |
          echo "TAGS<<EOF" >> $GITHUB_ENV

          DATE="$(date +'%Y%m%d')"
          for REGISTRY in {"","ghcr.io/"}; do
              echo $REGISTRY$IMAGE_NAME:$TAG >> $GITHUB_ENV
              echo $REGISTRY$IMAGE_NAME:$TAG-$DATE.$RUN_ID >> $GITHUB_ENV
              if [[ "$TAG" == "base" ]]; then
                  echo $REGISTRY$IMAGE_NAME:latest >> $GITHUB_ENV
              fi
          done

          echo "EOF" >> $GITHUB_ENV
        env:
          TAG: ${{ matrix.target.tag }}
          RUN_ID: ${{ github.run_id }}
      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm/v7,linux/arm64,linux/riscv64
          push: true
          tags: ${{ env.TAGS }}
          build-args: |
            PACKAGE_GROUP=${{ matrix.target.package-group }}
          cache-from: type=gha,scope=${{ matrix.target.tag }}
          cache-to: type=gha,scope=${{ matrix.target.tag }},mode=max

  keepalive:
    # GitHub disables scheduled workflows after 60 days without any
    # repository activity. A workflow_dispatch event — even one fired
    # from within a workflow using the default GITHUB_TOKEN — counts as
    # activity and resets the 60-day counter. So every Monday's
    # scheduled build ends by dispatching this same workflow to itself,
    # keeping the schedule alive indefinitely without ever committing
    # anything to main.
    if: github.event_name == 'schedule'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Self-dispatch on Mondays
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          [[ "$(date -u +%u)" == "1" ]] || exit 0
          gh workflow run build.yaml --repo "$GITHUB_REPOSITORY"
