name: Build and Push

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

env:
  IMAGE_NAME: menci/archlinuxarm

jobs:
  build:
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - tag: base
            package-group: base
          - tag: base-devel
            package-group: base base-devel
    name: ${{ matrix.target.tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Tag List
        run: |
          echo "TAGS<<EOF" >> $GITHUB_ENV

          DATE="$(date +'%Y%m%d')"
          for REGISTRY in {"","ghcr.io/"}; do
              echo $REGISTRY$IMAGE_NAME:$TAG >> $GITHUB_ENV
              echo $REGISTRY$IMAGE_NAME:$TAG-$DATE.$RUN_ID >> $GITHUB_ENV
              if [[ "$TAG" == "base" ]]; then
                  echo $REGISTRY$IMAGE_NAME:latest >> $GITHUB_ENV
              fi
          done

          echo "EOF" >> $GITHUB_ENV
        env:
          TAG: ${{ matrix.target.tag }}
          RUN_ID: ${{ github.run_id }}
      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm/v7,linux/arm64,linux/riscv64
          push: true
          tags: ${{ env.TAGS }}
          build-args: |
            PACKAGE_GROUP=${{ matrix.target.package-group }}
          cache-from: type=gha,scope=${{ matrix.target.tag }}
          cache-to: type=gha,scope=${{ matrix.target.tag }},mode=max

  keepalive:
    # GitHub disables scheduled workflows after 60 days without any
    # repository activity. Force-enabling the workflow via the Actions
    # API resets that inactivity counter — the same mechanism
    # `gh-workflow-immortality` uses. Only commit activity on the
    # default branch is documented as an activity signal, so this stays
    # a workaround (see PhrozenByte/gh-workflow-immortality) but it
    # avoids ever committing to main. Runs after every scheduled build.
    #
    # Requires a fine-grained PAT (KEEPALIVE_PAT secret) with only
    # `Actions: Read and write` scoped to this repo, because the built-in
    # GITHUB_TOKEN cannot call the workflow enable endpoint even with
    # `actions: write` requested.
    if: github.event_name == 'schedule'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Re-enable workflow to reset the 60-day inactivity clock
        env:
          GH_TOKEN: ${{ secrets.KEEPALIVE_PAT }}
        run: |
          gh api --method PUT \
            "repos/$GITHUB_REPOSITORY/actions/workflows/build.yaml/enable"
